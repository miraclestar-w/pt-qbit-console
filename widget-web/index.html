<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qBitWidget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #0a0d12;
  --bg1: #10151c;
  --card: rgba(255,255,255,0.035);
  --stroke: rgba(180, 205, 230, 0.12);
  --text: #edf2f7;
  --muted: #7b8d9e;
  --soft: #5b6c7c;
  --dl: #ff6b7a;
  --ul: #3ee08a;
  --seed: #5bc0ff;
  --stop: #f0c14a;
  --err: #ff7ab6;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: transparent; color: var(--text);
  font-family: "Segoe UI", "Microsoft YaHei UI", system-ui, sans-serif;
  user-select: none; -webkit-user-select: none; cursor: move;
}

.widget {
  position: relative; width: 100%; height: 100%;
  display: grid; grid-template-rows: auto auto auto 1fr auto;
  gap: 9px; padding: 11px 11px 10px; border-radius: 14px;
  border: 1px solid var(--stroke); overflow: hidden;
  background:
    radial-gradient(120% 90% at 0% 0%, rgba(255, 107, 122, 0.10), transparent 42%),
    radial-gradient(120% 90% at 100% 0%, rgba(62, 224, 138, 0.08), transparent 40%),
    linear-gradient(165deg, #141b24 0%, var(--bg0) 70%);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 28px rgba(0,0,0,0.45);
  transition: opacity 0.15s ease, filter 0.2s ease;
}
.widget::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.035), transparent 28%);
}
.widget.offline { filter: saturate(0.45) brightness(0.92); }

.hd { position: relative; z-index: 1; display: flex; align-items: center; gap: 8px; min-height: 18px; }
#statusDot.live { width: 8px; height: 8px; border-radius: 50%; background: var(--soft); flex: 0 0 auto; display: inline-block; }
#statusDot.live.on { background: var(--ul); box-shadow: 0 0 0 3px rgba(62, 224, 138, 0.14), 0 0 10px rgba(62, 224, 138, 0.55); }
.brand { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #dce8f2; line-height: 1; }
.badge { margin-left: auto; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted);
  padding: 3px 7px; border-radius: 999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); line-height: 1; }

.hero { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.lane { min-width: 0; padding: 8px 9px 7px; border-radius: 11px; background: var(--card); border: 1px solid rgba(255,255,255,0.045); }
.lane .tag { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); line-height: 1; }
.lane .tag i { font-style: normal; font-family: Consolas, "Cascadia Code", monospace; font-size: 11px; }
.lane.dl .tag { color: rgba(255, 140, 150, 0.95); }
.lane.ul .tag { color: rgba(130, 230, 170, 0.95); }
.lane .speed { margin-top: 6px; display: flex; align-items: baseline; gap: 4px; min-width: 0; white-space: nowrap; }
.lane .num { font: 700 20px/1 "Cascadia Code", Consolas, ui-monospace, monospace; letter-spacing: -0.03em; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.lane .unit { font: 600 10px/1 Consolas, ui-monospace, monospace; color: var(--muted); flex: 0 0 auto; opacity: 0.9; }
.lane.dl .num { color: var(--dl); }
.lane.ul .num { color: var(--ul); }
.lane.dl .unit { color: rgba(255, 107, 122, 0.75); }
.lane.ul .unit { color: rgba(62, 224, 138, 0.75); }
.lane.active.dl { border-color: rgba(255, 107, 122, 0.22); background: linear-gradient(180deg, rgba(255,107,122,0.08), rgba(255,255,255,0.025)); }
.lane.active.ul { border-color: rgba(62, 224, 138, 0.2); background: linear-gradient(180deg, rgba(62,224,138,0.07), rgba(255,255,255,0.025)); }
.lane .meta { margin-top: 5px; font: 600 11px/1 Consolas, ui-monospace, monospace; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lane.dl .meta { color: rgba(255, 107, 122, 0.8); }
.lane.ul .meta { color: rgba(62, 224, 138, 0.8); }

.counts { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
.cell { min-width: 0; text-align: center; padding: 6px 2px 5px; border-radius: 9px; background: rgba(255,255,255,0.028); border: 1px solid rgba(255,255,255,0.04); }
.cell .k { font-size: 10px; color: var(--muted); line-height: 1; white-space: nowrap; }
.cell .n { margin-top: 4px; font: 700 14px/1 Consolas, ui-monospace, monospace; color: var(--text); white-space: nowrap; }
.cell.dl .n { color: var(--dl); }
.cell.sd .n { color: var(--seed); }
.cell.st .n { color: var(--stop); }
.cell.er .n { color: var(--err); }

.strip { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; min-height: 0; }
.strip-hd { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.strip-hd .lbl { font-size: 10px; color: var(--soft); line-height: 1; }
.strip-hd .pct { font: 650 11px/1 Consolas, ui-monospace, monospace; color: #c8e5ff; white-space: nowrap; }
.bar { display: flex; height: 5px; border-radius: 99px; overflow: hidden; background: rgba(255,255,255,0.06); }
.bar > i { display: block; height: 100%; min-width: 0; transition: width 0.28s ease; }
.bar .b-dl { background: var(--dl); }
.bar .b-sd { background: var(--seed); }
.bar .b-st { background: var(--stop); }
.bar .b-er { background: var(--err); }

.ft { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.06); }
.stat { min-width: 0; }
.stat .k { font-size: 10px; color: var(--soft); line-height: 1; white-space: nowrap; }
.stat .v { margin-top: 4px; font: 700 11px/1.15 Consolas, ui-monospace, monospace; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat.dl .v { color: var(--dl); }
.stat.ul .v { color: var(--ul); }
.stat.disk .v { color: var(--seed); }

.menu { display: none; position: fixed; z-index: 30; min-width: 124px; padding: 5px; border-radius: 10px;
  border: 1px solid var(--stroke); background: rgba(16, 21, 28, 0.96); box-shadow: 0 10px 24px rgba(0,0,0,0.5); cursor: default; backdrop-filter: blur(8px); }
.menu.open { display: block; }
.menu button { display: block; width: 100%; border: 0; border-radius: 7px; background: transparent; color: var(--text); font-size: 12px; text-align: left; padding: 8px 10px; cursor: pointer; }
.menu button:hover { background: rgba(255,255,255,0.07); }
</style>
</head>
<body>
<div class="widget offline pywebview-drag-region" id="widget" title="左键拖动 · 右键菜单 · 滚轮透明度">
  <header class="hd">
    <span class="live" id="statusDot"></span>
    <span class="brand">qBit</span>
    <span class="badge" id="statusText">离线</span>
  </header>

  <section class="hero">
    <div class="lane dl" id="cardDl">
      <div class="tag"><i>↓</i>下载</div>
      <div class="speed">
        <span class="num" id="valDl">--</span>
        <span class="unit" id="unitDl">B/s</span>
      </div>
      <div class="meta" id="etaDl">ETA --</div>
    </div>
    <div class="lane ul" id="cardUl">
      <div class="tag"><i>↑</i>上传</div>
      <div class="speed">
        <span class="num" id="valUl">--</span>
        <span class="unit" id="unitUl">B/s</span>
      </div>
      <div class="meta" id="ratioUl">分享 --</div>
    </div>
  </section>

  <section class="counts">
    <div class="cell dl"><div class="k">下载</div><div class="n" id="statDl">-</div></div>
    <div class="cell sd"><div class="k">做种</div><div class="n" id="statSd">-</div></div>
    <div class="cell st"><div class="k">停止</div><div class="n" id="statSt">-</div></div>
    <div class="cell er"><div class="k">错误</div><div class="n" id="statEr">-</div></div>
  </section>

  <section class="strip">
    <div class="strip-hd">
      <span class="lbl">任务构成</span>
      <span class="pct" id="completePct" title="下载中任务平均进度">--</span>
    </div>
    <div class="bar" aria-hidden="true">
      <i class="b-dl" id="barDl"></i>
      <i class="b-sd" id="barSd"></i>
      <i class="b-st" id="barSt"></i>
      <i class="b-er" id="barEr"></i>
    </div>
  </section>

  <footer class="ft">
    <div class="stat dl">
      <div class="k">总下载</div>
      <div class="v" id="totalDl">---</div>
    </div>
    <div class="stat ul">
      <div class="k">总上传</div>
      <div class="v" id="totalUl">---</div>
    </div>
    <div class="stat disk">
      <div class="k">剩余盘</div>
      <div class="v" id="freeSpace">---</div>
    </div>
  </footer>
</div>

<div class="menu" id="contextMenu">
  <button type="button" onclick="callApi('open_webui')">打开 WebUI</button>
  <button type="button" onclick="callApi('hide_widget')">隐藏到托盘</button>
  <button type="button" onclick="callApi('close_widget')">退出</button>
</div>

<script>
const ids = {
  widget: document.getElementById('widget'),
  statusDot: document.getElementById('statusDot'),
  statusText: document.getElementById('statusText'),
  cardDl: document.getElementById('cardDl'),
  cardUl: document.getElementById('cardUl'),
  valDl: document.getElementById('valDl'),
  unitDl: document.getElementById('unitDl'),
  valUl: document.getElementById('valUl'),
  unitUl: document.getElementById('unitUl'),
  etaDl: document.getElementById('etaDl'),
  ratioUl: document.getElementById('ratioUl'),
  statDl: document.getElementById('statDl'),
  statSd: document.getElementById('statSd'),
  statSt: document.getElementById('statSt'),
  statEr: document.getElementById('statEr'),
  completePct: document.getElementById('completePct'),
  barDl: document.getElementById('barDl'),
  barSd: document.getElementById('barSd'),
  barSt: document.getElementById('barSt'),
  barEr: document.getElementById('barEr'),
  totalDl: document.getElementById('totalDl'),
  totalUl: document.getElementById('totalUl'),
  freeSpace: document.getElementById('freeSpace'),
  contextMenu: document.getElementById('contextMenu')
};

let widgetOpacity = 1;

function splitSpeed(bytes) {
  const b = Math.max(0, Number(bytes) || 0);
  if (b >= 1073741824) return { n: (b / 1073741824).toFixed(2), u: 'GB/s' };
  if (b >= 1048576) return { n: (b / 1048576).toFixed(1), u: 'MB/s' };
  if (b >= 1024) return { n: (b / 1024).toFixed(1), u: 'KB/s' };
  return { n: String(Math.round(b)), u: 'B/s' };
}

function fmtSize(bytes) {
  const b = Math.max(0, Number(bytes) || 0);
  if (b >= 1099511627776) return (b / 1099511627776).toFixed(2) + ' TB';
  if (b >= 1073741824) return (b / 1073741824).toFixed(1) + ' GB';
  if (b >= 1048576) return (b / 1048576).toFixed(1) + ' MB';
  if (b >= 1024) return (b / 1024).toFixed(0) + ' KB';
  return Math.round(b) + ' B';
}

function fmtEta(seconds) {
  const s = Number(seconds);
  if (!Number.isFinite(s) || s <= 0 || s >= 8640000) return 'ETA --';
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return 'ETA ' + d + 'd ' + h + 'h';
  if (h > 0) return 'ETA ' + String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  return 'ETA 00:' + String(m).padStart(2, '0');
}

function fmtRatio(ratio) {
  const r = Number(ratio);
  if (!Number.isFinite(r) || r < 0) return '分享 --';
  if (r >= 100) return '分享 ' + r.toFixed(0);
  if (r >= 10) return '分享 ' + r.toFixed(1);
  return '分享 ' + r.toFixed(2);
}

function setBars(nDl, nSd, nSt, nEr) {
  const total = Math.max(0, nDl + nSd + nSt + nEr);
  const pct = total
    ? function (n) { return ((n / total) * 100).toFixed(2) + '%'; }
    : function () { return '0%'; };
  ids.barDl.style.width = pct(nDl);
  ids.barSd.style.width = pct(nSd);
  ids.barSt.style.width = pct(nSt);
  ids.barEr.style.width = pct(nEr);
}

function setOffline() {
  ids.widget.classList.add('offline');
  ids.statusDot.className = 'live';
  ids.statusText.textContent = '离线';
  ids.valDl.textContent = '--';
  ids.unitDl.textContent = '';
  ids.valUl.textContent = '--';
  ids.unitUl.textContent = '';
  ids.etaDl.textContent = 'ETA --';
  ids.ratioUl.textContent = '分享 --';
  ids.statDl.textContent = '-';
  ids.statSd.textContent = '-';
  ids.statSt.textContent = '-';
  ids.statEr.textContent = '-';
  ids.completePct.textContent = '--';
  ids.completePct.title = '下载中任务平均进度';
  setBars(0, 0, 0, 0);
  ids.totalDl.textContent = '---';
  ids.totalUl.textContent = '---';
  ids.freeSpace.textContent = '---';
  ids.cardDl.className = 'lane dl';
  ids.cardUl.className = 'lane ul';
}

function updateData(data) {
  const d = data || {};
  if (!d.online) { setOffline(); return; }
  const dl = Math.max(0, Number(d.dl) || 0);
  const ul = Math.max(0, Number(d.ul) || 0);
  const ratio = Number(d.ratio);
  const nDl = Number(d.nDl) || 0;
  const nSd = Number(d.nSd) || 0;
  const nSt = Number(d.nSt) || 0;
  const nEr = Number(d.nEr) || 0;
  const progressPct = Number(d.progressPct) || 0;
  const sDl = splitSpeed(dl);
  const sUl = splitSpeed(ul);
  ids.widget.classList.remove('offline');
  ids.statusDot.className = 'live on';
  ids.statusText.textContent = '在线';
  ids.valDl.textContent = sDl.n;
  ids.unitDl.textContent = sDl.u;
  ids.valUl.textContent = sUl.n;
  ids.unitUl.textContent = sUl.u;
  ids.etaDl.textContent = nDl > 0 ? fmtEta(d.avgEta) : '空闲';
  ids.ratioUl.textContent = fmtRatio(ratio);
  ids.statDl.textContent = String(nDl);
  ids.statSd.textContent = String(nSd);
  ids.statSt.textContent = String(nSt);
  ids.statEr.textContent = String(nEr);
  if (nDl > 0) {
    ids.completePct.textContent = '进度 ' + progressPct.toFixed(0) + '%';
    ids.completePct.title = '下载中任务平均进度（' + nDl + ' 个）';
  } else {
    ids.completePct.textContent = '空闲';
    ids.completePct.title = '当前无下载中任务';
  }
  setBars(nDl, nSd, nSt, nEr);
  ids.totalDl.textContent = fmtSize(d.totalDl);
  ids.totalUl.textContent = fmtSize(d.totalUl);
  ids.freeSpace.textContent = (d.freeSpace == null || d.freeSpace === '') ? '---' : fmtSize(d.freeSpace);
  ids.cardDl.className = 'lane dl' + (dl > 0 ? ' active' : '');
  ids.cardUl.className = 'lane ul' + (ul > 0 ? ' active' : '');
}

function callApi(name) {
  closeContextMenu();
  if (window.pywebview && pywebview.api && typeof pywebview.api[name] === 'function') {
    Promise.resolve(pywebview.api[name]()).catch(function (error) {
      console.error('pywebview api failed:', name, error);
    });
  }
}

function closeContextMenu() { ids.contextMenu.classList.remove('open'); }

document.addEventListener('mousedown', function (event) {
  if (event.button !== 0) { event.stopPropagation(); return; }
  if (event.target.closest && event.target.closest('.menu')) { event.stopPropagation(); }
}, true);

document.querySelectorAll('.menu button').forEach(function (el) {
  el.addEventListener('mousedown', function (e) { e.stopPropagation(); });
});

document.addEventListener('contextmenu', function (event) {
  event.preventDefault(); event.stopPropagation();
  const x = Math.min(event.clientX, window.innerWidth - 136);
  const y = Math.min(event.clientY, window.innerHeight - 120);
  ids.contextMenu.style.left = Math.max(4, x) + 'px';
  ids.contextMenu.style.top = Math.max(4, y) + 'px';
  ids.contextMenu.classList.add('open');
});

document.addEventListener('click', function (event) {
  if (!event.target.closest || !event.target.closest('.menu')) closeContextMenu();
});

document.addEventListener('wheel', function (event) {
  widgetOpacity = Math.max(0.45, Math.min(1, widgetOpacity + (event.deltaY > 0 ? -0.05 : 0.05)));
  ids.widget.style.opacity = String(widgetOpacity);
}, { passive: true });
</script>
</body>
</html>
